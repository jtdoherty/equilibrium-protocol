[profile.default]
src = "src"
out = "out"
libs = ["lib"]

# IR pipeline + optimizer. Required so the multi-contract DeployFlywheel
# script compiles (the legacy pipeline hits "stack too deep"), and good
# practice for deployed bytecode.
optimizer = true
optimizer_runs = 200
via_ir = true

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
